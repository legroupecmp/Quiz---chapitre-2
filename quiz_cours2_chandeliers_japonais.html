<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz — L'Art des Chandeliers Japonais</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #F5F0E8;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1.25rem 5rem;
    }

    .container { width: 100%; max-width: 600px; }

    .header { margin-bottom: 2rem; }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(26,26,46,0.5);
      background: rgba(26,26,46,0.06);
      border: 1px solid rgba(26,26,46,0.12);
      padding: 4px 12px;
      border-radius: 99px;
      margin-bottom: 14px;
    }

    .page-title {
      font-family: 'EB Garamond', serif;
      font-size: 38px;
      font-weight: 400;
      color: #1a1a2e;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .page-subtitle {
      font-size: 14px;
      color: rgba(26,26,46,0.45);
    }

    .divider { height: 1px; background: #ddd6ca; margin: 1.75rem 0; }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .q-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(26,26,46,0.4);
    }

    .score-live { font-size: 13px; font-weight: 500; color: rgba(26,26,46,0.45); }

    .progress-bar-bg { height: 3px; background: #ddd6ca; border-radius: 99px; margin-bottom: 1.75rem; }
    .progress-bar-fill { height: 3px; background: #1a1a2e; border-radius: 99px; transition: width 0.5s ease; }

    .question-card {
      background: #ffffff;
      border: 1px solid #ddd6ca;
      border-radius: 4px;
      padding: 1.75rem;
      margin-bottom: 1rem;
    }

    .question-num {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(26,26,46,0.3);
      margin-bottom: 10px;
    }

    .question-text {
      font-family: 'EB Garamond', serif;
      font-size: 22px;
      font-weight: 400;
      color: #1a1a2e;
      line-height: 1.5;
    }

    .options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1rem; }

    .option-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 16px;
      border: 1px solid #ddd6ca;
      border-radius: 4px;
      background: #ffffff;
      cursor: pointer;
      text-align: left;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: #1a1a2e;
      transition: all 0.15s;
      width: 100%;
    }

    .option-btn:hover:not(:disabled) { background: #f0ebe1; border-color: #b8b0a0; }

    .option-letter {
      width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid #ddd6ca;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600;
      color: rgba(26,26,46,0.35);
      flex-shrink: 0; transition: all 0.15s;
    }

    .option-btn.correct { border-color: #0F6E56; background: #E1F5EE; }
    .option-btn.correct .option-letter { background: #0F6E56; color: white; border-color: #0F6E56; }
    .option-btn.wrong { border-color: #993C1D; background: #FAECE7; }
    .option-btn.wrong .option-letter { background: #993C1D; color: white; border-color: #993C1D; }
    .option-btn.reveal { border-color: #0F6E56; background: #E1F5EE; opacity: 0.7; }
    .option-btn.reveal .option-letter { background: #0F6E56; color: white; border-color: #0F6E56; }
    .option-btn:disabled { cursor: default; }

    .feedback {
      display: none;
      padding: 13px 16px;
      border-radius: 4px;
      font-size: 14px;
      font-style: italic;
      line-height: 1.6;
      margin-bottom: 1rem;
    }
    .feedback.show { display: flex; gap: 10px; align-items: flex-start; }
    .feedback.correct { background: #E1F5EE; color: #085041; border-left: 3px solid #0F6E56; }
    .feedback.wrong { background: #FAECE7; color: #4A1B0C; border-left: 3px solid #993C1D; }

    .nav-area { display: flex; justify-content: flex-end; }

    .btn-next {
      padding: 10px 28px;
      border-radius: 4px;
      background: #1a1a2e;
      color: white;
      border: none;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.04em;
      cursor: pointer;
      display: none;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-next:hover { opacity: 0.82; }
    .btn-next:active { transform: scale(0.98); }

    .results-wrap { display: none; }

    .score-row {
      display: flex;
      align-items: center;
      gap: 1.75rem;
      background: #ffffff;
      border: 1px solid #ddd6ca;
      border-radius: 4px;
      padding: 1.75rem;
      margin-bottom: 1.75rem;
    }

    .score-circle {
      width: 88px; height: 88px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'EB Garamond', serif;
      font-size: 26px; font-weight: 400;
      flex-shrink: 0;
    }

    .score-text h2 {
      font-family: 'EB Garamond', serif;
      font-size: 24px; font-weight: 400;
      color: #1a1a2e; margin-bottom: 4px;
    }

    .score-text p { font-size: 14px; color: rgba(26,26,46,0.5); line-height: 1.5; }

    .review-label {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(26,26,46,0.3); margin-bottom: 1rem;
    }

    .review-item {
      background: #ffffff;
      border: 1px solid #ddd6ca;
      border-radius: 4px;
      padding: 1rem 1.25rem;
      margin-bottom: 8px;
    }

    .review-q {
      font-size: 14px; font-weight: 500; color: #1a1a2e;
      margin-bottom: 6px;
      display: flex; gap: 10px; align-items: flex-start;
    }

    .review-answer {
      font-size: 13px; color: rgba(26,26,46,0.5);
      font-style: italic; display: flex; gap: 6px;
    }
    .review-answer strong { color: rgba(26,26,46,0.7); font-style: normal; }

    .tag {
      font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 99px; flex-shrink: 0;
    }
    .tag-correct { background: #E1F5EE; color: #085041; border: 1px solid #9FE1CB; }
    .tag-wrong { background: #FAECE7; color: #4A1B0C; border: 1px solid #F5C4B3; }

    .btn-retry {
      margin-top: 1.5rem; width: 100%;
      padding: 11px;
      border-radius: 4px;
      border: 1px solid #c8c0b0;
      background: #fff;
      color: rgba(26,26,46,0.55);
      font-size: 13px; font-weight: 600;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.04em;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-retry:hover { background: #f0ebe1; color: #1a1a2e; }

    @media (max-width: 480px) {
      .page-title { font-size: 30px; }
      .question-text { font-size: 19px; }
      .score-row { flex-direction: column; text-align: center; gap: 1rem; }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="badge">Cours 2</div>
      <h1 class="page-title">L'Art des Chandeliers Japonais</h1>
      <p class="page-subtitle">5 questions pour valider vos connaissances</p>
    </div>

    <div class="divider"></div>

    <div id="quizWrap">
      <div class="progress-meta">
        <span class="q-label" id="qCounter">Question 1 sur 5</span>
        <span class="score-live" id="scoreLive">0 / 5</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressBar" style="width:20%"></div>
      </div>

      <div class="question-card">
        <div class="question-num" id="questionNum">Question 1</div>
        <div class="question-text" id="questionText"></div>
      </div>

      <div class="options" id="optionsWrap"></div>
      <div class="feedback" id="feedback"></div>
      <div class="nav-area">
        <button class="btn-next" id="btnNext">Suivant →</button>
      </div>
    </div>

    <div class="results-wrap" id="resultsWrap">
      <div class="score-row">
        <div class="score-circle" id="scoreCircle"></div>
        <div class="score-text">
          <h2 id="scoreMsg"></h2>
          <p id="scoreDetail"></p>
        </div>
      </div>
      <div class="review-label">Révision des réponses</div>
      <div id="reviewList"></div>
      <button class="btn-retry" onclick="restartQuiz()">↺ Recommencer le quiz</button>
    </div>

  </div>

  <script>
    const questions = [
      {
        q: "Qu'est-ce que le corps (real body) d'une bougie japonaise représente ?",
        opts: [
          "Le prix le plus haut et le plus bas de la séance",
          "La différence entre le prix d'ouverture et le prix de clôture",
          "Le volume d'échanges de la séance",
          "La tendance générale du marché sur la semaine"
        ],
        correct: 1,
        explanation: "Le corps est le rectangle entre le prix d'ouverture et le prix de clôture. Un corps vert = clôture au-dessus de l'ouverture (haussier), un corps rouge = clôture en dessous (baissier)."
      },
      {
        q: "Qu'indique une longue mèche haute sur une bougie japonaise ?",
        opts: [
          "Les acheteurs ont dominé toute la séance",
          "Le volume était très élevé durant la séance",
          "Les acheteurs ont poussé le prix très haut, mais les vendeurs ont repris le contrôle",
          "Le marché était en tendance haussière forte"
        ],
        correct: 2,
        explanation: "Une longue mèche haute indique que les acheteurs ont tenté de pousser le prix vers le haut, mais les vendeurs ont repris le contrôle et ramené le prix vers le bas — signal baissier potentiel."
      },
      {
        q: "Qu'est-ce qu'un Doji et que signifie-t-il ?",
        opts: [
          "Une bougie sans mèches qui indique une conviction totale",
          "Une bougie dont le corps est inexistant ou quasi-nul, signalant l'indécision du marché",
          "Une bougie avec un petit corps en haut et une longue mèche basse",
          "Un pattern de deux bougies indiquant un retournement baissier"
        ],
        correct: 1,
        explanation: "Le Doji a un prix d'ouverture et de clôture identiques — corps inexistant. Il symbolise l'indécision totale entre acheteurs et vendeurs. Il doit toujours être confirmé par la bougie suivante."
      },
      {
        q: "Quelle est la structure du pattern 'Marteau' (Hammer) et quel signal donne-t-il ?",
        opts: [
          "Grand corps haussier sans mèches — conviction des acheteurs en sommet de tendance",
          "Petit corps en bas, longue mèche haute — signal de retournement baissier",
          "Petit corps en haut, longue mèche basse — signal de retournement haussier en bas de tendance",
          "Deux bougies dont la seconde englobe la première — signal de continuation"
        ],
        correct: 2,
        explanation: "Le Marteau a un petit corps en haut et une longue mèche basse (au moins 2× le corps). Il apparaît en bas de tendance baissière et signale que les vendeurs ont poussé le prix bas, mais les acheteurs ont repris le contrôle."
      },
      {
        q: "Dans le pattern 'Étoile du Matin' (Morning Star), quel est le rôle de la bougie centrale ?",
        opts: [
          "Confirmer la tendance baissière en cours",
          "Représenter l'hésitation du marché — le pivot entre les deux camps",
          "Englober entièrement la première bougie pour signaler le retournement",
          "Indiquer un volume exceptionnel sur la séance"
        ],
        correct: 1,
        explanation: "La bougie centrale (souvent un Doji) représente l'hésitation — le marché marque une pause où les deux camps sont à égalité. C'est le cœur du pattern, le moment pivot avant que le nouveau camp prenne le contrôle."
      }
    ];

    let current = 0, score = 0, userAnswers = [];
    const letters = ['A','B','C','D'];

    function renderQuestion() {
      const q = questions[current];
      document.getElementById('progressBar').style.width = ((current+1)/questions.length*100)+'%';
      document.getElementById('qCounter').textContent = `Question ${current+1} sur ${questions.length}`;
      document.getElementById('scoreLive').textContent = `${score} / ${questions.length}`;
      document.getElementById('questionNum').textContent = `Question ${current+1}`;
      document.getElementById('questionText').textContent = q.q;

      const wrap = document.getElementById('optionsWrap');
      wrap.innerHTML = '';
      q.opts.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
        btn.onclick = () => selectAnswer(i, btn);
        wrap.appendChild(btn);
      });

      document.getElementById('feedback').className = 'feedback';
      document.getElementById('feedback').innerHTML = '';
      document.getElementById('btnNext').style.display = 'none';
    }

    function selectAnswer(idx, btn) {
      const q = questions[current];
      const btns = document.querySelectorAll('.option-btn');
      btns.forEach(b => b.disabled = true);
      userAnswers.push(idx);

      const fb = document.getElementById('feedback');
      if (idx === q.correct) {
        score++;
        btn.classList.add('correct');
        fb.className = 'feedback correct show';
        fb.innerHTML = `<span>✓</span><span>${q.explanation}</span>`;
      } else {
        btn.classList.add('wrong');
        btns[q.correct].classList.add('reveal');
        fb.className = 'feedback wrong show';
        fb.innerHTML = `<span>✗</span><span>Incorrect. ${q.explanation}</span>`;
      }

      document.getElementById('scoreLive').textContent = `${score} / ${questions.length}`;
      const nextBtn = document.getElementById('btnNext');
      nextBtn.style.display = 'block';
      nextBtn.textContent = current < questions.length - 1 ? 'Suivant →' : 'Voir mes résultats →';
    }

    document.getElementById('btnNext').onclick = () => {
      current++;
      if (current < questions.length) renderQuestion();
      else showResults();
    };

    function showResults() {
      document.getElementById('quizWrap').style.display = 'none';
      document.getElementById('resultsWrap').style.display = 'block';

      const pct = Math.round(score / questions.length * 100);
      const circle = document.getElementById('scoreCircle');
      circle.textContent = `${score} / ${questions.length}`;

      if (pct >= 80) {
        circle.style.cssText = 'background:#E1F5EE;color:#085041;border:1px solid #9FE1CB;width:88px;height:88px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:"EB Garamond",serif;font-size:26px;flex-shrink:0';
        document.getElementById('scoreMsg').textContent = 'Excellent travail !';
        document.getElementById('scoreDetail').textContent = 'Vous maîtrisez bien les chandeliers japonais. Passez au cours suivant.';
      } else if (pct >= 60) {
        circle.style.cssText = 'background:#FAEEDA;color:#633806;border:1px solid #FAC775;width:88px;height:88px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:"EB Garamond",serif;font-size:26px;flex-shrink:0';
        document.getElementById('scoreMsg').textContent = 'Bon résultat !';
        document.getElementById('scoreDetail').textContent = 'Quelques figures méritent d\'être revues avant de continuer.';
      } else {
        circle.style.cssText = 'background:#FAECE7;color:#4A1B0C;border:1px solid #F5C4B3;width:88px;height:88px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:"EB Garamond",serif;font-size:26px;flex-shrink:0';
        document.getElementById('scoreMsg').textContent = 'À retravailler';
        document.getElementById('scoreDetail').textContent = 'Relisez le cours sur les figures de chandeliers avant de continuer.';
      }

      const list = document.getElementById('reviewList');
      list.innerHTML = '';
      questions.forEach((q, i) => {
        const ok = userAnswers[i] === q.correct;
        const div = document.createElement('div');
        div.className = 'review-item';
        div.innerHTML = `
          <div class="review-q">
            <span class="tag ${ok ? 'tag-correct' : 'tag-wrong'}">${ok ? '✓' : '✗'}</span>
            <span>${q.q}</span>
          </div>
          <div class="review-answer">
            <span>→</span>
            <span>Bonne réponse : <strong>${q.opts[q.correct]}</strong></span>
          </div>`;
        list.appendChild(div);
      });
    }

    function restartQuiz() {
      current = 0; score = 0; userAnswers = [];
      document.getElementById('quizWrap').style.display = 'block';
      document.getElementById('resultsWrap').style.display = 'none';
      renderQuestion();
    }

    renderQuestion();
  </script>
</body>
</html>
